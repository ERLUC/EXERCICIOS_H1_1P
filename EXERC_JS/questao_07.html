<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 07</title>
</head>
<body>
    <h1>SUBTRAÇÃO</h1>
    <input type="number" id="numero1" placeholder="Digite o primeiro número:"><br>
    <input type="number" id="numero2" placeholder="Digite o segundo número:"><br>

    <input type="button" value="Clique aqui para subtrair" onclick="sub()">

    <div id="subtrair"></div>

        <script>
            function sub() {
                var n1 = parseFloat(document.getElementById("numero1").value);
                var n2 = parseFloat(document.getElementById("numero2").value);
                var resto = n1 - n2;
                document.getElementById("subtrair").innerHTML =
                "<h2> Resultado: "+resto+ "</h2>";
            }
        </script>


</body>
</html>
