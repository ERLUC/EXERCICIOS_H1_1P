<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 06</title>
</head>
<body>
    <h1>CIDADE</h1>
    <input type="text" id="cidade" placeholder="Digite sua cidade: ">
    <input type="button" value="Confirmar" onclick="mostrar()">

        <script>
            function mostrar() {
                var cidade = document.getElementById("cidade").value;
                alert("Você mora na cidade de "+cidade+".");
            }
        </script>
</body>
</html>
